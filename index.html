<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#01696f" />
  <title>PD Supplies</title>
  <style>
    :root, [data-theme="light"] {
      --text-xs: 0.8rem;
      --text-sm: 0.9rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #5f5d58; --color-text-faint: #8c8a84; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --color-warning: #964219; --color-error: #a12c7b; --color-success: #437a22; --color-blue: #006494;
      --radius-sm: 0.5rem; --radius-md: 0.75rem; --radius-lg: 1rem; --radius-xl: 1.25rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06); --shadow-md: 0 8px 22px rgba(0,0,0,.08);
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #22211f; --color-border: #393836; --color-divider: #262523;
      --color-text: #e4e1da; --color-text-muted: #b5b1aa; --color-text-faint: #87837d; --color-text-inverse: #111;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
      --color-warning: #d38d67; --color-error: #d163a7; --color-success: #82ba5e; --color-blue: #70addb;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.25); --shadow-md: 0 8px 22px rgba(0,0,0,.35);
    }
    *,*::before,*::after{box-sizing:border-box;}
    html{-webkit-text-size-adjust:none;text-size-adjust:none;scroll-behavior:smooth;}
    body{margin:0;min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.5;background:var(--color-bg);color:var(--color-text);}
    button,input,select,textarea{font:inherit;color:inherit;}
    button{cursor:pointer;border:none;background:none;}
    .app{max-width:720px;margin:0 auto;padding:env(safe-area-inset-top) var(--space-3) var(--space-4);}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) 0;background:linear-gradient(180deg,var(--color-bg) 80%,transparent);}

    .hero{padding:var(--space-4);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);}
    .hero h2{margin:0 0 0.25rem;font-size:var(--text-lg);}
    .hero p{margin:0;color:var(--color-text-muted);font-size:var(--text-xs);}
    .hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-top:var(--space-3);}
    .stat{padding:var(--space-2);border-radius:var(--radius-lg);background:var(--color-surface-2);text-align:center;}
    .stat strong{font-size:var(--text-lg);}
    .stat span{font-size:var(--text-xs);color:var(--color-text-muted);}

    .controls{display:grid;gap:var(--space-3);margin-bottom:var(--space-4);}
    .search{display:flex;gap:var(--space-2);align-items:center;min-height:44px;padding:0 0.5rem;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-full);}
    .search input{border:none;outline:none;background:transparent;width:100%;}
    .btn{min-height:44px;border-radius:var(--radius-full);padding:0 1rem;font-weight:700;}

    .btn-primary{background:var(--color-primary);color:var(--color-text-inverse);}
    .btn-secondary{background:var(--color-surface);border:1px solid var(--color-border);}

    .view{display:grid;gap:var(--space-3);margin:var(--space-3) 0;}
    .list{display:grid;gap:var(--space-3);}
    .card{padding:var(--space-3);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);}
    .row{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-3);}
    .name{font-size:var(--text-sm);font-weight:700;margin:0;}
    .meta{font-size:var(--text-xs);color:var(--color-text-muted);}
    .chip{display:inline-block;padding:0.25rem 0.6rem;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;background:var(--color-surface-2);}
    .chip.out{color:var(--color-error);}

    .empty{padding:var(--space-4);text-align:center;color:var(--color-text-muted);}

    .sheet-wrap{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:end;justify-content:center;padding:var(--space-3);z-index:20;}
    .sheet-wrap.open{display:flex;}
    .sheet{width:min(100%,720px);max-height:90dvh;overflow:auto;padding:var(--space-5);background:var(--color-surface);border-radius:var(--radius-xl);border:1px solid var(--color-border);border-bottom-left-radius:0;border-bottom-right-radius:0;}
    form{display:grid;gap:var(--space-3);}
    .field{display:grid;gap:var(--space-2);}
    .field label{font-size:var(--text-sm);font-weight:700;}
    .field input,.field select{min-height:44px;padding:0 0.75rem;border-radius:var(--radius-md);border:1px solid var(--color-border);}

    .footer-note{margin-top:calc(var(--space-4) + 60px + env(safe-area-inset-bottom,0px));font-size:var(--text-xs);color:var(--color-text-muted);text-align:center;}

    .bottom-tabbar{
      position:fixed;
      bottom:0;
      bottom:env(safe-area-inset-bottom,0px);
      height:60px;
      padding:0 0.5rem;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:0.5rem;
      border-top:1px solid rgba(0,0,0,.1);
      background:var(--color-bg);
      background:linear-gradient(180deg,var(--color-surface) 0%,color-mix(in srgb,var(--color-surface-offset),white 10%) 100%);
      backdrop-filter:blur(8px);
      box-shadow:0 -1px 8px rgba(0,0,0,.08);
      z-index:40;
    }
    .bottom-tabbar .tab{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0.25rem 0;
      border-radius:var(--radius-sm);
      font-size:var(--text-xs);
      color:var(--color-text-faint);
    }
    .bottom-tabbar .tab.active{color:var(--color-primary);}
    .bottom-tabbar .icon{font-size:1.15rem;}

    @media (max-width:520px){
      .hero-stats{grid-template-columns:1fr;}
      .app{padding-inline:0.5rem;}
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>PD Supplies</h1>
        <p>Mobile tracker for home dialysis inventory</p>
      </div>
      <button id="themeToggle" type="button" style="width:36px;height:36px;border-radius:9999px;background:var(--color-surface);border:1px solid #ccc;">🌙</button>
    </header>

    <main id="main" style="padding-bottom:calc(60px + var(--space-4))">
      <section class="hero">
        <h2>Track what you have before reorder day.</h2>
        <p>PD supplies, support items, clinic pickups, and ordering planning.</p>
        <div class="hero-stats">
          <div class="stat"><strong id="statTotal">0</strong><span>Total items</span></div>
          <div class="stat"><strong id="statLow">0</strong><span>Need attention</span></div>
        </div>
      </section>

      <section class="controls">
        <div class="search"><span aria-hidden="true">🔍</span><input id="searchInput" type="search" placeholder="Search supply name" /></div>
        <div>
          <button class="btn btn-primary" id="newBtn" type="button">+ Add supply</button>
          <button class="btn btn-secondary" id="exportBtn" type="button">Export JSON</button>
        </div>
      </section>

      <section id="inventoryView" class="view">
        <div class="list" id="inventoryList"></div>
      </section>
      <section id="reorderView" class="view hidden">
        <div class="list" id="reorderList"></div>
      </section>
      <section id="clinicView" class="view hidden">
        <div class="list" id="clinicList"></div>
      </section>
      <section id="historyView" class="view hidden">
        <div class="list" id="historyList"></div>
      </section>

      <p class="footer-note">Data saves only in this browser on this device.</p>
    </main>

    <nav class="bottom-tabbar" role="navigation" aria-label="App sections">
      <button class="tab active" data-tab="inventory" type="button">
        <span class="icon">📦</span>
        <span>Inventory</span>
      </button>
      <button class="tab" data-tab="reorder" type="button">
        <span class="icon">🔄</span>
        <span>Reorder</span>
      </button>
      <button class="tab" data-tab="clinic" type="button">
        <span class="icon">🏥</span>
        <span>Clinic</span>
      </button>
      <button class="tab" data-tab="history" type="button">
        <span class="icon">📊</span>
        <span>History</span>
      </button>
    </nav>

    <div class="sheet-wrap" id="sheetWrap" aria-hidden="true">
      <section class="sheet" aria-labelledby="sheetTitle">
        <div class="row">
          <h3 id="sheetTitle">New supply</h3>
          <button id="closeSheet" type="button">×</button>
        </div>
        <form id="itemForm">
          <input type="hidden" id="itemId" />
          <div class="field">
            <label for="name">Item name</label>
            <input id="name" required placeholder="Dialysate, masks, etc." />
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category">
              <option value="PD supply">PD supply</option>
              <option value="Support supply">Support supply</option>
              <option value="Medication">Medication</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="unit">Unit</label>
            <input id="unit" placeholder="bags, boxes, etc." />
          </div>
          <div class="field">
            <label for="onHand">On hand</label>
            <input id="onHand" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label for="biweeklyNeed">Bi‑weekly need</label>
            <input id="biweeklyNeed" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label for="reorderPoint">Reorder point</label>
            <input id="reorderPoint" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label for="reserve">Emergency reserve</label>
            <input id="reserve" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label for="homeQty">Plan home delivery</label>
            <input id="homeQty" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label for="clinicQty">Plan clinic pickup</label>
            <input id="clinicQty" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status">
              <option value="draft">Draft</option>
              <option value="planned">Planned</option>
              <option value="submitted">Submitted in MyBaxter</option>
              <option value="received">Received</option>
            </select>
          </div>
          <div class="field">
            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="Storage, clinic details…"></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
            <button type="submit" class="btn btn-primary">Save</button>
            <button id="deleteBtn" class="btn btn-secondary">Delete</button>
          </div>
        </form>
      </section>
    </div>

    <script>
      const STORAGE_KEY = "pd-supplies-v1";
      const seed = {
        activeTab: "inventory", search: "", items: [], history: []
      };

      const $ = (id) => document.getElementById(id);
      const state = loadState();
      const views = { inventory: $("inventoryView"), reorder: $("reorderView"), clinic: $("clinicView"), history: $("historyView") };
      const tabs = document.querySelectorAll(".bottom-tabbar .tab");
      const viewsList = Object.values(views);

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? { ...seed, ...JSON.parse(raw) } : seed;
        } catch (e) {
          return seed;
        }
      }
      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function num(v) {
        return Number(v) || 0;
      }
      function statusMeta(item) {
        const out = num(item.onHand) === 0;
        const low = num(item.onHand) <= Math.max(num(item.reorderPoint), num(item.reserve));
        const totalPlanned = num(item.homeQty) + num(item.clinicQty);
        const needsOrder = num(item.biweeklyNeed) > num(item.onHand) || low
